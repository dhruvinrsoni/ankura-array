<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vaak-Smith</title>
    <meta
      name="description"
      content="Vaak-Smith — Engineer structured prompts using proven frameworks. Configure provider-specific parameters and export production-ready prompts."
    />
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="style.css" />
    <script src="../app_registry.js"></script>
  </head>
  <body><script>!function(){try{var id=new URLSearchParams(location.search).get('instanceId')||sessionStorage.getItem('ankura_instanceId')||'';var raw=id?localStorage.getItem(id+'__theme'):null;var v=raw?JSON.parse(raw):'auto';var d=v==='dark'||(v==='auto'&&window.matchMedia('(prefers-color-scheme:dark)').matches);document.body.classList.toggle('dark-theme',d);document.body.classList.toggle('light-theme',!d)}catch(e){}}()</script>
    <!-- ── Top Bar ─────────────────────────────────── -->
    <header class="top-bar">
      <h1 class="top-bar__title">
        <span class="accent">🧠</span> Vaak-Smith <span class="top-bar__short-form">(VS)</span>
      </h1>
      <div class="top-bar__left">
        <div class="top-bar__meta" title="Instance timestamps">
          <span id="meta-created" class="meta-item">Created: —</span>
          <span id="meta-updated" class="meta-item">Updated: —</span>
        </div>
      </div>
      <div class="top-bar__actions">
        <button id="btn-back" class="btn btn--outline" title="Back to dashboard">← Back</button>
        <button id="btn-reset" class="btn btn--danger" title="Reset all fields and clear saved state">
          ↺ Reset
        </button>
        <button id="btn-delete" class="btn btn--danger-outline" title="Delete this instance and close tab">🗑 Delete</button>
        <select id="theme-select" class="select" title="Theme">
          <option value="auto">Auto</option>
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </div>
    </header>

    <!-- ── App Layout ──────────────────────────────── -->
    <div class="app-layout">
      <!-- content will be populated by local app.js -->
      <div class="panel panel--editor">
        <!-- Pre-Flight: Task Type -->
        <div class="vs-preflight">
          <label class="vs-preflight-label">Define your universe</label>
          <small class="vs-preflight-subtitle">Every prompt spawns a world for the AI. What kind of world are you building?</small>
          <div id="preflight-row" class="vs-preflight-row">
            <!-- Injected by app.js -->
          </div>
        </div>

        <!-- Config Row -->
        <div class="config-row">
          <div class="config-group">
            <label class="field-label" for="select-framework">Framework</label>
            <select id="select-framework" class="select"></select>
          </div>
        </div>

        <div id="framework-fields" class="editor-section"></div>


        <div class="editor-section">
          <div class="float-field">
            <textarea id="system-instructions" class="textarea textarea--system float-field__textarea" placeholder=" "></textarea>
            <label class="float-field__label" for="system-instructions">Define the AI's role, persona, and behavioral guidelines...</label>
          </div>
        </div>

        <!-- Ground Truths — axioms the AI must accept -->
        <details id="ground-truths-wrap" class="vs-ground-truths">
          <summary class="vs-ground-truths__summary">Ground Truths <small>(axioms the AI must accept)</small></summary>
          <textarea id="ground-truths" class="textarea" rows="3"
            placeholder="Facts the AI must treat as fixed. e.g. 'Codebase uses Python 3.11. No internet access at runtime. User is always an internal engineer.'"></textarea>
        </details>

        <!-- User prompt removed; composed from per-framework fields -->

        <!-- tuning module removed to keep UI minimal and future-proof -->
      </div>

      <div class="panel panel--preview">
        <div class="preview-header">
          <span class="preview-title">Output Preview</span>
          <div class="preview-actions">
            <button id="btn-copy-plain" class="btn btn--outline" title="Copy as plain text">📋 Copy Plain</button>
            <button id="btn-copy-markdown" class="btn btn--solid" title="Copy as structured Markdown">📝 Copy Markdown</button>
            <button id="btn-export-template" class="btn btn--outline" title="Export prompt as JSON template">⬇ Export</button>
            <button id="btn-import-template" class="btn btn--outline" title="Import a template JSON">⬆ Import</button>
          </div>
          <input type="file" id="import-template-file" accept=".json" style="display:none">
          <!-- preview hint removed -->
        </div>
          <div class="preview-monitor">
          <pre id="output-preview" class="preview-content preview-content--empty">Configure your prompt to see a live preview…</pre>
          <div id="preview-status" class="preview-status">Tokens: ~—</div>
        </div>
      </div>
    </div>

    <script src="llmConfigs.js"></script>
    <script src="../ankura-core.js"></script>
    <script src="app.js"></script>
  </body>
</html>
